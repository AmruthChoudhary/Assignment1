{% extends "base.html" %}

{% block title %}Create Assignment - Assignment Management System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-plus me-2"></i>Create New Assignment
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="createAssignmentForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">
                                <i class="fas fa-heading me-1"></i>Assignment Title *
                            </label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="subject" class="form-label">
                                <i class="fas fa-book me-1"></i>Subject *
                            </label>
                            <input type="text" class="form-control" id="subject" name="subject" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">
                            <i class="fas fa-align-left me-1"></i>Description
                        </label>
                        <textarea class="form-control" id="description" name="description" rows="4" 
                                  placeholder="Enter assignment details, requirements, instructions..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="deadline" class="form-label">
                                <i class="fas fa-calendar-alt me-1"></i>Deadline *
                            </label>
                            <input type="datetime-local" class="form-control" id="deadline" name="deadline" required>
                            <div class="form-text">Set the submission deadline</div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="max_marks" class="form-label">
                                <i class="fas fa-star me-1"></i>Maximum Marks *
                            </label>
                            <input type="number" class="form-control" id="max_marks" name="max_marks" 
                                   min="1" required>
                            <div class="form-text">Total marks for this assignment</div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="attachment" class="form-label">
                            <i class="fas fa-paperclip me-1"></i>Attachment (Optional)
                        </label>
                        <input type="file" class="form-control" id="attachment" name="attachment" 
                               accept=".txt,.pdf,.png,.jpg,.jpeg,.gif,.doc,.docx,.zip,.rar">
                        <div class="form-text">
                            Upload assignment files (PDF, DOC, Images, ZIP - Max 16MB)
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Create Assignment
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Set minimum deadline to current time
const deadlineInput = document.getElementById('deadline');
const now = new Date();
now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
deadlineInput.min = now.toISOString().slice(0, 16);

// Form validation
document.getElementById('createAssignmentForm').addEventListener('submit', function(e) {
    const deadline = new Date(document.getElementById('deadline').value);
    const now = new Date();
    
    if (deadline <= now) {
        e.preventDefault();
        alert('Deadline must be in the future!');
    }
});
</script>
{% endblock %}
